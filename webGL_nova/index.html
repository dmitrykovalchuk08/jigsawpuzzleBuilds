<!DOCTYPE html>
<html lang="en-us">
<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<meta name="google-adsense-account" content="ca-pub-2577840413102430">
	<title>Jigsaw Nova</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		html, body {
			background: #1a1a2e;
			width: 100%; height: 100%;
			overflow: hidden;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		}

		/* ---- Splash screen ---- */
		#splash {
			position: fixed; inset: 0;
			display: flex; flex-direction: column;
			justify-content: center; align-items: center;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
			z-index: 10;
			transition: opacity 0.4s ease;
		}
		#splash.hidden { opacity: 0; pointer-events: none; }

		#splash-title {
			color: #e0e0e0;
			font-size: clamp(1.4rem, 4vw, 2.4rem);
			font-weight: 700;
			letter-spacing: 0.02em;
			margin-bottom: 2rem;
			text-align: center;
			padding: 0 1rem;
		}

		#start-btn {
			position: relative;
			padding: 1rem 3rem;
			font-size: clamp(1rem, 2.5vw, 1.3rem);
			font-weight: 600;
			color: #fff;
			background: #e94560;
			border: none; border-radius: 12px;
			cursor: pointer;
			transition: transform 0.15s ease, box-shadow 0.15s ease;
			box-shadow: 0 4px 24px rgba(233, 69, 96, 0.35);
		}
		#start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 32px rgba(233, 69, 96, 0.5); }
		#start-btn:active { transform: translateY(0); }
		#start-btn:disabled { cursor: default; opacity: 0.7; transform: none; }

		/* ---- Loading bar (shown after click) ---- */
		#load-wrap {
			display: none;
			flex-direction: column; align-items: center;
			margin-top: 2rem; width: min(80%, 360px);
		}
		#load-wrap.visible { display: flex; }

		#load-bar-track {
			width: 100%; height: 6px;
			background: rgba(255,255,255,0.12);
			border-radius: 3px; overflow: hidden;
		}
		#load-bar-fill {
			width: 0%; height: 100%;
			background: #e94560;
			border-radius: 3px;
			transition: width 0.25s ease;
		}
		#load-percent {
			color: rgba(255,255,255,0.5);
			font-size: 0.85rem;
			margin-top: 0.6rem;
		}

		/* ---- Error overlay ---- */
		#error-overlay {
			display: none;
			position: fixed; inset: 0;
			justify-content: center; align-items: center;
			background: rgba(0,0,0,0.85);
			z-index: 20;
		}
		#error-overlay.visible { display: flex; }
		#error-box {
			background: #2a2a3e; color: #e0e0e0;
			padding: 2rem; border-radius: 12px;
			max-width: 420px; text-align: center;
			line-height: 1.5;
		}
		#error-box h2 { color: #e94560; margin-bottom: 0.5rem; }

		/* ---- Game container ---- */
		#gameContainer {
			position: fixed;
			top: 0; left: 0;
			width: 100%; height: 100%;
			background: transparent !important;
			overflow: hidden;
		}
		#gameContainer canvas {
			position: absolute;
			display: block;
		}
	</style>
</head>

<body>

	<!-- Splash screen -->
	<div id="splash">
		<div id="splash-title">Jigsaw Nova</div>
		<!-- <button id="start-btn">Play</button> -->
		<div id="load-wrap">
			<div id="load-bar-track"><div id="load-bar-fill"></div></div>
			<div id="load-percent">0%</div>
		</div>
	</div>

	<!-- Error overlay -->
	<div id="error-overlay">
		<div id="error-box">
			<h2>Unable to Start</h2>
			<p id="error-msg">Your browser may not support WebGL. Please try a modern browser like Chrome or Firefox.</p>
		</div>
	</div>

	<!-- Game canvas (hidden until Unity is ready) -->
	<div id="gameContainer" style="display:none;">
		<canvas id="unity-canvas"></canvas>
	</div>

	<script src="Build/webGL_nova.loader.js"></script>
	<script>
		(function () {
			var splash      = document.getElementById('splash');
			var loadWrap    = document.getElementById('load-wrap');
			var loadFill    = document.getElementById('load-bar-fill');
			var loadPercent = document.getElementById('load-percent');
			var errorOverlay = document.getElementById('error-overlay');
			var errorMsg    = document.getElementById('error-msg');
			var container   = document.getElementById('gameContainer');
			var canvas      = document.getElementById('unity-canvas');
			var lockedAspectRatio = null;

			var config = {
				dataUrl:      "Build/webGL_nova.data.unityweb",
				frameworkUrl:  "Build/webGL_nova.framework.js.unityweb",
				codeUrl:       "Build/webGL_nova.wasm.unityweb",
				streamingAssetsUrl: "StreamingAssets",
				companyName:   "AmpFork",
				productName:   "Jigsaw Nova",
				productVersion: "1.0.5",
			};

			function showError(msg) {
				if (msg) errorMsg.textContent = msg;
				errorOverlay.classList.add('visible');
			}

			function onProgress(progress) {
				var pct = Math.round(progress * 100);
				loadFill.style.width = pct + '%';
				loadPercent.textContent = pct + '%';
			}

			function onResize() {
				var viewportWidth = window.innerWidth;
				var viewportHeight = window.innerHeight;

				if (!lockedAspectRatio) {
					lockedAspectRatio = viewportWidth / viewportHeight;
				}

				var targetWidth = viewportWidth;
				var targetHeight = Math.round(targetWidth / lockedAspectRatio);

				if (targetHeight > viewportHeight) {
					targetHeight = viewportHeight;
					targetWidth = Math.round(targetHeight * lockedAspectRatio);
				}

				var leftOffset = Math.floor((viewportWidth - targetWidth) / 2);
				var topOffset = Math.floor((viewportHeight - targetHeight) / 2);

				canvas.style.left = leftOffset + 'px';
				canvas.style.top = topOffset + 'px';
				canvas.style.width = targetWidth + 'px';
				canvas.style.height = targetHeight + 'px';

				var pixelRatio = window.devicePixelRatio || 1;
				canvas.width = Math.floor(targetWidth * pixelRatio);
				canvas.height = Math.floor(targetHeight * pixelRatio);
			}

			function startUnity() {
				loadWrap.classList.add('visible');
				lockedAspectRatio = window.innerWidth / window.innerHeight;

				container.style.display = '';
				onResize();

				createUnityInstance(canvas, config, onProgress)
					.then(function (instance) {
						canvas = instance.Module.canvas;
						onResize();
						splash.classList.add('hidden');
						setTimeout(function () { splash.style.display = 'none'; }, 400);
					})
					.catch(function (err) {
						showError(typeof err === 'string' ? err : err.message);
					});
			}

			window.addEventListener('resize', onResize);
			startUnity();
		})();
	</script>
